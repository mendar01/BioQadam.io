<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ұстаз: Қадам құрастыру | BioQadam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm py-4">
        <div class="container mx-auto px-6">
            <a href="index.html" class="text-blue-600 font-bold hover:text-blue-700">
                <i class="fa-solid fa-arrow-left mr-2"></i> Басты бетке қайту
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl max-w-lg w-full border-t-4 border-blue-500">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
                    <i class="fa-solid fa-chalkboard-user"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-800">Сабақ құрастыру</h2>
                <p class="text-slate-500 mt-2">AI арқылы оқушыларыңызға арнайы тапсырмалар жасаңыз.</p>
            </div>

            <form action="#" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Оқытатын сынып:</label>
                    <select class="w-full border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
                        <option>7-сынып</option>
                        <option>8-сынып</option>
                        <option>9-сынып</option>
                        <option>10-сынып (ЖМБ)</option>
                        <option>11-сынып (ЖМБ)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Қай сабақ тақырыбын немесе оқу мақсатын қамтимыз?</label>
                    <input type="text" placeholder="Мысалы: Фотосинтез фазалары..." class="w-full border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Генерация форматы:</label>
                    <select class="w-full border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
                        <option>Сюжеттік кейс (Детектив)</option>
                        <option>Далалық зерттеу (Экспедиция)</option>
                        <option>Стандартты тест сұрақтары</option>
                    </select>
                </div>

                <button type="button" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-500 transition shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> ИИ арқылы генерациялау
                </button>
            </form>
        </div>
    </main>
</body>

</html>

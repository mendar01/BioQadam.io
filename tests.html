<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интеллектуалды Тесттер | BioQadam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm py-4 sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="text-amber-600 font-bold hover:text-amber-700 flex items-center">
                <i class="fa-solid fa-arrow-left mr-2"></i> Басты бетке
            </a>
            <div class="text-xl font-extrabold text-slate-800">
                <i class="fa-solid fa-list-check text-amber-500 mr-2"></i> BioQadam <span class="text-amber-500">Quiz</span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-2xl">
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border-t-4 border-amber-500">
                <div class="p-8">
                    <div class="flex justify-between items-center mb-6">
                        <span class="bg-amber-100 text-amber-800 text-xs font-bold px-3 py-1 rounded-full uppercase">Сұрақ 1 / 10</span>
                        <span class="text-slate-400 font-bold text-sm"><i class="fa-regular fa-clock"></i> 00:45</span>
                    </div>
                    
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">
                        Фотосинтездің жарық фазасында қандай процесс жүреді?
                    </h2>

                    <div class="space-y-4">
                        <label class="flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition">
                            <input type="radio" name="quiz" class="w-5 h-5 text-amber-500 focus:ring-amber-500">
                            <span class="ml-3 text-lg text-slate-700">Глюкозаның синтезделуі</span>
                        </label>
                        <label class="flex items-center p-4 border border-amber-500 bg-amber-50 rounded-xl cursor-pointer transition">
                            <input type="radio" name="quiz" class="w-5 h-5 text-amber-500 focus:ring-amber-500" checked>
                            <span class="ml-3 text-lg font-semibold text-amber-900">Судың фотолизі (ыдырауы)</span>
                        </label>
                        <label class="flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition">
                            <input type="radio" name="quiz" class="w-5 h-5 text-amber-500 focus:ring-amber-500">
                            <span class="ml-3 text-lg text-slate-700">Көмірқышқыл газының сіңірілуі</span>
                        </label>
                        <label class="flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition">
                            <input type="radio" name="quiz" class="w-5 h-5 text-amber-500 focus:ring-amber-500">
                            <span class="ml-3 text-lg text-slate-700">Кальвин циклі</span>
                        </label>
                    </div>

                    <div class="mt-8 flex justify-end">
                        <button class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-8 rounded-xl transition shadow-lg shadow-amber-500/30 flex items-center">
                            Келесі сұрақ <i class="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="mt-6 bg-blue-50 border border-blue-200 rounded-2xl p-4 flex gap-4 items-start shadow-sm">
                <div class="bg-blue-100 text-blue-600 rounded-full w-10 h-10 flex items-center justify-center shrink-0">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <h4 class="font-bold text-blue-800 text-sm mb-1">ИИ Көмекші:</h4>
                    <p class="text-sm text-blue-900">Есіңізде болсын, жарық фазасы тек хлоропласттың тилакоидтарында жарықтың қатысуымен жүреді. Ол кезде оттегі бөлініп шығады!</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оқушы: Қадам баптаулары | BioQadam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm py-4">
        <div class="container mx-auto px-6">
            <a href="index.html" class="text-emerald-600 font-bold hover:text-emerald-700 transition">
                <i class="fa-solid fa-arrow-left mr-2"></i> Басты бетке қайту
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl max-w-2xl w-full border-t-4 border-emerald-500">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
                    <i class="fa-solid fa-user-graduate"></i>
                </div>
                <h2 class="text-3xl font-bold text-slate-800">Оқушы параметрлері</h2>
                <p class="text-slate-500 mt-2">Қадамды бастамас бұрын деректеріңізді және тақырыпты таңдаңыз.</p>
            </div>

            <form id="student-form" class="space-y-6">
                <div>
                    <label for="student-name" class="block text-sm font-bold text-slate-700 mb-2">Аты-жөніңіз:</label>
                    <input 
                        id="student-name"
                        type="text" 
                        placeholder="Мысалы: Асан Үсенов" 
                        class="w-full border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50"
                    >
                    <p id="name-error" class="text-red-500 text-sm mt-2 hidden">Аты-жөніңізді енгізіңіз.</p>
                </div>

                <div>
                    <label for="student-grade" class="block text-sm font-bold text-slate-700 mb-2">Сыныбыңыз:</label>
                    <select 
                        id="student-grade"
                        class="w-full border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50"
                    >
                        <option value="7-сынып">7-сынып</option>
                        <option value="8-сынып">8-сынып</option>
                        <option value="9-сынып">9-сынып</option>
                        <option value="10-сынып">10-сынып</option>
                        <option value="11-сынып">11-сынып</option>
                    </select>
                </div>

                <div>
                    <label for="section-topic" class="block text-sm font-bold text-slate-700 mb-2">Бөлім тақырыбы:</label>
                    <select 
                        id="section-topic"
                        class="w-full border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50"
                    ></select>
                    <p id="section-error" class="text-red-500 text-sm mt-2 hidden">Бөлім тақырыбын таңдаңыз.</p>
                </div>

                <div>
                    <label for="lesson-topic" class="block text-sm font-bold text-slate-700 mb-2">Сабақ тақырыбы:</label>
                    <select 
                        id="lesson-topic"
                        class="w-full border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50"
                    ></select>
                    <p id="lesson-error" class="text-red-500 text-sm mt-2 hidden">Сабақ тақырыбын таңдаңыз.</p>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Қиындық деңгейі:</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="difficulty" value="Оңай" class="peer sr-only" checked>
                            <div class="text-center p-3 rounded-xl border border-slate-200 peer-checked:bg-emerald-50 peer-checked:border-emerald-500 peer-checked:text-emerald-700 transition font-semibold">
                                Оңай
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="difficulty" value="Орташа" class="peer sr-only">
                            <div class="text-center p-3 rounded-xl border border-slate-200 peer-checked:bg-amber-50 peer-checked:border-amber-500 peer-checked:text-amber-700 transition font-semibold">
                                Орташа
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="difficulty" value="Қиын" class="peer sr-only">
                            <div class="text-center p-3 rounded-xl border border-slate-200 peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-700 transition font-semibold">
                                Қиын
                            </div>
                        </label>
                    </div>
                </div>

                <button 
                    id="start-btn"
                    type="submit" 
                    class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl hover:bg-emerald-500 transition shadow-lg shadow-emerald-500/30"
                >
                    Қадамды бастау 🚀
                </button>
            </form>

            <div id="success-message" class="hidden mt-6 rounded-2xl bg-emerald-50 border border-emerald-200 p-4 text-emerald-700 font-medium text-center">
                Деректер сақталды! Тестке өту...
            </div>
        </div>
    </main>

    <script>
        const topicsByGrade = {
            "7-сынып": {
                "7.3А Бөліп шығару": [
                    "Бөліп шығару мүшелерінің құрылысын сипаттау",
                    "Бөліп шығару үдерісінің маңызын түсіндіру"
                ],
                "7.3В Қозғалыс": [
                    "Ағзалардың қозғалыс түрлерін сипаттау",
                    "Тірі ағзалардағы қозғалыстың маңызын түсіндіру"
                ],
                "7.3С Координация және реттелу": [
                    "Жүйке жүйесінің қызметін түсіндіру",
                    "Координация және реттелу ұғымдарын сипаттау"
                ]
            },

            "8-сынып": {
                "8.3А Бөліп шығару": [
                    "Бүйректің құрылысын сипаттау",
                    "Зәр түзілу үдерісін түсіндіру"
                ],
                "8.3В Қозғалыс": [
                    "Тірек-қимыл жүйесінің қызметін сипаттау",
                    "Бұлшықет пен сүйектің байланысын түсіндіру"
                ],
                "8.3С Координация және реттелу": [
                    "Рецепторлардың қызметін түсіндіру",
                    "Жүйке және гуморальдық реттелуді салыстыру"
                ]
            },

            "9-сынып": {
                "9.3А Қозғалыс": [
                    "Бұлшықет ұлпасының құрылысын сипаттау",
                    "Қозғалыстың биологиялық маңызын түсіндіру"
                ],
                "9.3В Молекулалық биология": [
                    "ДНҚ құрылысын сипаттау",
                    "Ақуыз биосинтезін түсіндіру"
                ],
                "9.3С Жасушалық цикл": [
                    "Жасушалық цикл кезеңдерін сипаттау",
                    "Митоз үдерісін түсіндіру"
                ],
                "9.3D Тұқымқуалаушылық пен өзгергіштік": [
                    "Тұқымқуалаушылық ұғымын түсіндіру",
                    "Өзгергіштік түрлерін сипаттау"
                ]
            },

            "10-сынып": {
                "10.3А Жасушалық биология": [
                    "Жасуша құрылымдарының қызметін сипаттау",
                    "Жасуша мембранасы арқылы тасымалды түсіндіру"
                ],
                "10.3В Тұқымқуалаушылық пен өзгергіштік": [
                    "Генетикалық ақпараттың берілуін түсіндіру",
                    "Мутация мен өзгергіштікті сипаттау"
                ],
                "10.3С Эволюциялық даму. Селекция. Тірі ағзалардың көптүрлілігі": [
                    "Эволюциялық дамуды түсіндіру",
                    "Селекцияның маңызын сипаттау"
                ]
            },

            "11-сынып": {
                "11.3А Жасушалық биология": [
                    "Жасушаның молекулалық деңгейін түсіндіру",
                    "Жасушалық үдерістерді талдау"
                ],
                "11.3В Биотехнология": [
                    "Биотехнологияның қолданылуын сипаттау",
                    "Гендік инженерия негіздерін түсіндіру"
                ],
                "11.3С Биомедицина және биоинформатика": [
                    "Биомедицинаның маңызын түсіндіру",
                    "Биоинформатиканың рөлін сипаттау"
                ]
            }
        };

        const form = document.getElementById('student-form');
        const nameInput = document.getElementById('student-name');
        const gradeSelect = document.getElementById('student-grade');
        const sectionTopicSelect = document.getElementById('section-topic');
        const lessonTopicSelect = document.getElementById('lesson-topic');

        const nameError = document.getElementById('name-error');
        const sectionError = document.getElementById('section-error');
        const lessonError = document.getElementById('lesson-error');
        const successMessage = document.getElementById('success-message');
        const startBtn = document.getElementById('start-btn');

        function getSelectedDifficulty() {
            const selected = document.querySelector('input[name="difficulty"]:checked');
            return selected ? selected.value : 'Оңай';
        }

        function populateSectionTopics() {
            const selectedGrade = gradeSelect.value;
            const gradeTopics = topicsByGrade[selectedGrade];

            sectionTopicSelect.innerHTML = '';
            lessonTopicSelect.innerHTML = '';

            Object.keys(gradeTopics).forEach(topic => {
                const option = document.createElement('option');
                option.value = topic;
                option.textContent = topic;
                sectionTopicSelect.appendChild(option);
            });

            populateLessonTopics();
        }

        function populateLessonTopics() {
            const selectedGrade = gradeSelect.value;
            const selectedSection = sectionTopicSelect.value;
            const lessonTopics = topicsByGrade[selectedGrade][selectedSection];

            lessonTopicSelect.innerHTML = '';

            lessonTopics.forEach(topic => {
                const option = document.createElement('option');
                option.value = topic;
                option.textContent = topic;
                lessonTopicSelect.appendChild(option);
            });
        }

        function saveStudentData() {
            const studentData = {
                name: nameInput.value.trim(),
                grade: gradeSelect.value,
                sectionTopic: sectionTopicSelect.value,
                lessonTopic: lessonTopicSelect.value,
                difficulty: getSelectedDifficulty(),
                savedAt: new Date().toISOString()
            };

            localStorage.setItem('bioqadam_student', JSON.stringify(studentData));
            return studentData;
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const name = nameInput.value.trim();
            let hasError = false;

            if (!name) {
                nameError.classList.remove('hidden');
                nameInput.classList.add('border-red-400', 'ring-2', 'ring-red-200');
                nameInput.focus();
                hasError = true;
            } else {
                nameError.classList.add('hidden');
                nameInput.classList.remove('border-red-400', 'ring-2', 'ring-red-200');
            }

            if (!sectionTopicSelect.value) {
                sectionError.classList.remove('hidden');
                hasError = true;
            } else {
                sectionError.classList.add('hidden');
            }

            if (!lessonTopicSelect.value) {
                lessonError.classList.remove('hidden');
                hasError = true;
            } else {
                lessonError.classList.add('hidden');
            }

            if (hasError) return;

            const studentData = saveStudentData();

            startBtn.disabled = true;
            startBtn.classList.add('opacity-70', 'cursor-not-allowed');
            successMessage.classList.remove('hidden');

            console.log('Сақталған деректер:', studentData);

            setTimeout(() => {
                window.location.href = 'tests.html';
            }, 1200);
        });

        gradeSelect.addEventListener('change', populateSectionTopics);
        sectionTopicSelect.addEventListener('change', populateLessonTopics);

        window.addEventListener('DOMContentLoaded', () => {
            populateSectionTopics();

            const savedData = localStorage.getItem('bioqadam_student');

            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);

                    if (parsed.name) nameInput.value = parsed.name;
                    if (parsed.grade) gradeSelect.value = parsed.grade;

                    populateSectionTopics();

                    if (parsed.sectionTopic) sectionTopicSelect.value = parsed.sectionTopic;
                    populateLessonTopics();

                    if (parsed.lessonTopic) lessonTopicSelect.value = parsed.lessonTopic;

                    if (parsed.difficulty) {
                        const radio = document.querySelector(`input[name="difficulty"][value="${parsed.difficulty}"]`);
                        if (radio) radio.checked = true;
                    }
                } catch (error) {
                    console.error('Деректерді оқу қатесі:', error);
                }
            }
        });

        nameInput.addEventListener('input', () => {
            if (nameInput.value.trim()) {
                nameError.classList.add('hidden');
                nameInput.classList.remove('border-red-400', 'ring-2', 'ring-red-200');
            }
        });
    </script>
</body>
</html>
